<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>DIRT v2 — Doing Innovative Research on Technology</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Share+Tech+Mono&family=Exo+2:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --void:#02010A;--deep:#060412;--surface:#0C0919;--card:#11101F;--raised:#17152A;
  --b0:#1A1730;--b1:#252140;--b2:#352E60;
  --amber:#F5A623;--amber2:#FFD27A;--amber3:#C47B10;
  --cyan:#00E5FF;--green:#39FF6E;--red:#FF3B5C;--purple:#9B59FF;
  --t1:#EDE8FF;--t2:#9B93C4;--t3:#554E7A;
  --fd:'Orbitron',monospace;--fm:'Share Tech Mono',monospace;--fb:'Exo 2',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--void);color:var(--t1);font-family:var(--fb);overflow:hidden;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 60% 40% at 70% 10%,rgba(93,63,211,.05) 0%,transparent 60%),
             radial-gradient(ellipse 40% 30% at 20% 80%,rgba(245,166,35,.04) 0%,transparent 60%),
             radial-gradient(1px 1px at 15% 25%,rgba(245,166,35,.5) 0%,transparent 100%),
             radial-gradient(1px 1px at 85% 15%,rgba(0,229,255,.4) 0%,transparent 100%),
             radial-gradient(1px 1px at 45% 65%,rgba(255,255,255,.2) 0%,transparent 100%),
             radial-gradient(1px 1px at 72% 82%,rgba(245,166,35,.3) 0%,transparent 100%),
             radial-gradient(1px 1px at 8%  55%,rgba(0,229,255,.25) 0%,transparent 100%),
             radial-gradient(1px 1px at 92% 45%,rgba(155,89,255,.3) 0%,transparent 100%);}
#app{position:relative;z-index:1;height:100vh;display:flex;flex-direction:column;}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:3px;height:3px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px;}

/* ── KEYFRAMES ── */
@keyframes spin-cw{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes spin-ccw{from{transform:rotate(360deg)}to{transform:rotate(0)}}
@keyframes pulse-g{0%,100%{opacity:1;box-shadow:0 0 10px var(--green)}50%{opacity:.4;box-shadow:none}}
@keyframes pulse-a{0%,100%{box-shadow:0 0 8px var(--amber)}50%{box-shadow:none}}
@keyframes slide-up{from{transform:translateY(10px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes fade-in{from{opacity:0}to{opacity:1}}
@keyframes typing{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}
@keyframes scan{0%{top:-2px}100%{top:100%}}
@keyframes progress-glow{0%,100%{box-shadow:0 0 6px var(--amber)}50%{box-shadow:0 0 20px var(--amber),0 0 40px rgba(245,166,35,.2)}}
@keyframes plan-pulse{0%,100%{opacity:.6}50%{opacity:1}}
@keyframes counter{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}
@keyframes score-fill{from{width:0}to{width:var(--target)}}

.spin-cw{animation:spin-cw 18s linear infinite}
.spin-ccw{animation:spin-ccw 12s linear infinite}
.pulse-g{animation:pulse-g 1.5s ease-in-out infinite}
.slide-up{animation:slide-up .3s ease forwards}
.fade-in{animation:fade-in .5s ease forwards}

/* ── TYPOGRAPHY ── */
.fd{font-family:var(--fd)}
.fm{font-family:var(--fm)}
.amber{color:var(--amber)} .amber2{color:var(--amber2)} .cyan{color:var(--cyan)}
.green{color:var(--green)} .red{color:var(--red)} .purple{color:var(--purple)}
.t2{color:var(--t2)} .t3{color:var(--t3)}
.glow-a{text-shadow:0 0 14px var(--amber),0 0 30px rgba(245,166,35,.3)}
.glow-c{text-shadow:0 0 10px var(--cyan)}

/* ── HEADER ── */
#header{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 24px;border-bottom:1px solid var(--b0);
  background:rgba(2,1,10,.92);backdrop-filter:blur(12px);
  position:sticky;top:0;z-index:100;flex-shrink:0;
}
.logo-text{font-family:var(--fd);font-size:17px;font-weight:900;color:var(--amber);letter-spacing:5px}
.header-badges{display:flex;gap:8px;align-items:center}
.model-badge{padding:4px 10px;font-family:var(--fm);font-size:9px;letter-spacing:1.5px;border:1px solid}
.model-badge.primary{border-color:rgba(245,166,35,.4);background:rgba(245,166,35,.05);color:var(--amber)}
.model-badge.fallback{border-color:rgba(0,229,255,.3);background:rgba(0,229,255,.04);color:var(--cyan)}
.online-dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green)}

/* ── METRICS BAR ── */
#metrics{
  display:grid;grid-template-columns:repeat(5,1fr);
  border-bottom:1px solid var(--b0);flex-shrink:0;
}
.metric{
  padding:10px 16px;border-right:1px solid var(--b0);
  background:rgba(12,9,25,.6);
}
.metric-val{font-family:var(--fd);font-size:18px;font-weight:700;color:var(--amber)}
.metric-lbl{font-family:var(--fm);font-size:8px;color:var(--t3);letter-spacing:2px;margin-top:2px;text-transform:uppercase}

/* ── NAV TABS ── */
#nav{display:flex;border-bottom:1px solid var(--b0);background:var(--deep);flex-shrink:0;overflow-x:auto;}
.tab{
  padding:11px 18px;font-family:var(--fd);font-size:9px;letter-spacing:2px;text-transform:uppercase;
  background:none;border:none;border-bottom:2px solid transparent;color:var(--t3);cursor:pointer;
  transition:all .2s;white-space:nowrap;
}
.tab.active{border-bottom-color:var(--amber);color:var(--amber)}
.tab:hover:not(.active){color:var(--t2)}

/* ── MAIN LAYOUT ── */
#main{flex:1;overflow:hidden;display:flex;}
.panel{flex:1;overflow-y:auto;padding:20px;}
.split-left{flex:1;overflow-y:auto;padding:20px;border-right:1px solid var(--b0);}
.split-right{width:280px;overflow-y:auto;padding:16px;flex-shrink:0;}

/* ── CARDS ── */
.card{
  background:var(--card);border:1px solid var(--b0);
  position:relative;overflow:hidden;margin-bottom:12px;
}
.card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--amber),transparent);opacity:.25;
}
.card-body{padding:16px;}
.card-title{font-family:var(--fd);font-size:9px;letter-spacing:3px;color:var(--amber);text-transform:uppercase;margin-bottom:10px}

/* ── SECTION LABEL ── */
.slabel{font-family:var(--fd);font-size:8px;letter-spacing:4px;color:var(--amber);text-transform:uppercase;margin-bottom:6px}

/* ── BUTTONS ── */
.btn{
  font-family:var(--fd);font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  border:none;cursor:pointer;padding:10px 20px;transition:all .2s;position:relative;
}
.btn-primary{background:var(--amber);color:#000}
.btn-primary:hover{background:var(--amber2);box-shadow:0 0 20px rgba(245,166,35,.4);transform:translateY(-1px)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}
.btn-ghost{background:transparent;border:1px solid var(--b1);color:var(--t2)}
.btn-ghost:hover{border-color:var(--amber);color:var(--amber)}
.btn-danger{background:transparent;border:1px solid rgba(255,59,92,.4);color:var(--red)}
.btn-danger:hover{background:rgba(255,59,92,.1)}

/* ── INPUTS ── */
.inp{
  width:100%;background:var(--deep);border:1px solid var(--b1);
  color:var(--t1);font-family:var(--fb);font-size:13px;
  padding:10px 14px;outline:none;transition:border-color .2s;
}
.inp:focus{border-color:var(--amber);box-shadow:0 0 0 1px rgba(245,166,35,.2);}
.inp::placeholder{color:var(--t3);}
textarea.inp{resize:vertical;}

/* ── STATUS DOTS ── */
.sdot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:7px;flex-shrink:0}
.sdot.active{background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse-g 1.5s infinite}
.sdot.idle{background:var(--t3)}
.sdot.busy{background:var(--cyan);box-shadow:0 0 8px var(--cyan);animation:pulse-a 1s infinite}

/* ── TERMINAL ── */
.term{font-family:var(--fm);font-size:10.5px;line-height:2;padding:1px 0;}
.term.success{color:var(--green)} .term.info{color:var(--cyan)}
.term.warn{color:var(--amber)} .term.default{color:var(--t2)}
.term.plan{color:var(--purple)} .term.reflect{color:var(--amber2)}
.term.new{animation:slide-up .25s ease}

/* ── PROGRESS ── */
.ptrack{background:var(--deep);border:1px solid var(--b0);height:4px;overflow:hidden}
.pfill{height:100%;background:linear-gradient(90deg,var(--amber3),var(--amber),var(--amber2));transition:width .5s ease;animation:progress-glow 2s infinite}

/* ── PIPELINE STAGES ── */
.pipeline{display:flex;align-items:center;gap:0;margin:12px 0;}
.stage{
  flex:1;padding:8px 10px;text-align:center;
  font-family:var(--fd);font-size:8px;letter-spacing:1.5px;text-transform:uppercase;
  border:1px solid var(--b0);background:var(--deep);color:var(--t3);
  transition:all .3s;position:relative;
}
.stage.active{border-color:var(--amber);color:var(--amber);background:rgba(245,166,35,.06);animation:plan-pulse 1.5s infinite}
.stage.done{border-color:var(--green);color:var(--green);background:rgba(57,255,110,.05)}
.stage.failed{border-color:var(--red);color:var(--red)}
.stage-arrow{font-size:10px;color:var(--b2);flex-shrink:0;padding:0 4px}

/* ── SCORE BADGE ── */
.score-ring{
  width:54px;height:54px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;flex-direction:column;
  border:2px solid;font-family:var(--fd);flex-shrink:0;
}
.score-ring.high{border-color:var(--green);color:var(--green)}
.score-ring.mid{border-color:var(--amber);color:var(--amber)}
.score-ring.low{border-color:var(--red);color:var(--red)}

/* ── MEMORY CHIP ── */
.mem-chip{
  display:inline-flex;align-items:center;gap:6px;
  padding:4px 10px;border:1px solid var(--b1);background:rgba(155,89,255,.06);
  font-family:var(--fm);font-size:9px;color:var(--purple);margin:3px;
}
.mem-chip .mem-pin{font-size:8px;color:var(--amber)}

/* ── AGENT CARD ── */
.agent-card{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;background:var(--card);border:1px solid var(--b0);
  margin-bottom:6px;transition:border-color .2s;cursor:default;
}
.agent-icon{font-size:20px;width:32px;text-align:center;flex-shrink:0}
.agent-info{flex:1;min-width:0}
.agent-name{font-family:var(--fd);font-size:9px;letter-spacing:2px;color:var(--t1)}
.agent-role{font-family:var(--fm);font-size:8px;color:var(--t3);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ── CHAT ── */
.chat-wrap{display:flex;flex-direction:column;height:100%;overflow:hidden}
.chat-msgs{flex:1;overflow-y:auto;padding:12px 4px;display:flex;flex-direction:column;gap:10px}
.msg{max-width:88%;padding:12px 16px;font-size:13px;line-height:1.75}
.msg.user{align-self:flex-end;background:rgba(245,166,35,.08);border:1px solid rgba(245,166,35,.25);color:var(--amber2);font-family:var(--fm)}
.msg.assistant{align-self:flex-start;background:var(--card);border:1px solid var(--b0);color:var(--t1)}
.msg-label{font-family:var(--fd);font-size:8px;letter-spacing:2px;color:var(--amber);margin-bottom:8px}
.msg-stage{display:inline-block;font-family:var(--fm);font-size:8px;padding:2px 8px;border:1px solid;margin-top:8px;margin-right:4px}
.msg-stage.plan-s{border-color:var(--purple);color:var(--purple)}
.msg-stage.exec-s{border-color:var(--cyan);color:var(--cyan)}
.msg-stage.reflect-s{border-color:var(--green);color:var(--green)}

/* ── SCORE BAR ── */
.sbar-wrap{margin-top:10px;padding-top:10px;border-top:1px solid var(--b0)}
.sbar-row{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.sbar-lbl{font-family:var(--fm);font-size:9px;color:var(--t3);width:80px;flex-shrink:0}
.sbar-track{flex:1;height:4px;background:var(--deep);border:1px solid var(--b0);overflow:hidden}
.sbar-fill{height:100%;transition:width 1s ease}
.sbar-val{font-family:var(--fm);font-size:9px;width:30px;text-align:right;flex-shrink:0}

/* ── TYPING ── */
.typing-wrap{display:flex;align-items:center;gap:8px;padding:12px 16px;background:var(--card);border:1px solid var(--b0);width:fit-content}
.tdot{width:4px;height:4px;border-radius:50%;background:var(--amber);display:inline-block;margin:0 2px}
.tdot:nth-child(1){animation:typing 1.4s ease-in-out 0s infinite}
.tdot:nth-child(2){animation:typing 1.4s ease-in-out .2s infinite}
.tdot:nth-child(3){animation:typing 1.4s ease-in-out .4s infinite}

/* ── SCAN FX ── */
.scan-fx{position:relative;overflow:hidden}
.scan-fx::after{
  content:'';position:absolute;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,rgba(245,166,35,.5),transparent);
  animation:scan 5s linear infinite;
}

/* ── DAILY CYCLE ── */
.cycle-step{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--b0);align-items:flex-start}
.cycle-num{font-family:var(--fd);font-size:10px;color:var(--amber);min-width:28px;padding-top:2px}
.cycle-content{flex:1}
.cycle-title{font-size:13px;color:var(--t1);font-weight:600;margin-bottom:3px}
.cycle-detail{font-family:var(--fm);font-size:10px;color:var(--t3);line-height:1.7}

/* ── APPROVAL GATE ── */
.gate{
  border:1px solid var(--amber);background:rgba(245,166,35,.05);
  padding:16px;margin:10px 0;position:relative;
}
.gate::before{content:'⚠ HUMAN APPROVAL REQUIRED';font-family:var(--fd);font-size:8px;letter-spacing:2px;color:var(--amber);display:block;margin-bottom:8px}

/* ── GRID UTILS ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.flex{display:flex} .flex-col{flex-direction:column}
.items-center{align-items:center} .justify-between{justify-content:space-between}
.gap-8{gap:8px} .gap-12{gap:12px}
.mt-8{margin-top:8px} .mt-12{margin-top:12px} .mt-16{margin-top:16px}
.mb-8{margin-bottom:8px}
.w100{width:100%}
.pre{white-space:pre-wrap}

/* ── LANDING ── */
#landing{
  flex:1;display:flex;align-items:center;justify-content:center;
  padding:40px 20px;overflow-y:auto;
}
.hero-center{text-align:center;max-width:800px;animation:fade-in .8s ease}
.hero-title{font-family:var(--fd);font-size:clamp(52px,10vw,96px);font-weight:900;color:var(--amber);letter-spacing:8px;line-height:1}
.hero-sub{font-family:var(--fd);font-size:10px;letter-spacing:5px;color:var(--t2);margin:12px 0 24px}
.hero-desc{font-size:15px;color:var(--t2);line-height:1.8;max-width:560px;margin:0 auto 32px;font-weight:300}

/* ── ORBIT SVG ── */
.orbit-wrap{position:relative;width:260px;height:260px;margin:0 auto 24px}

/* ── ONBOARD ── */
#onboard{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px;overflow-y:auto}
.ob-box{width:100%;max-width:540px;animation:slide-up .4s ease}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  #metrics{grid-template-columns:repeat(3,1fr)}
  .split-right{display:none}
  .g2,.g3{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div id="app"></div>

<script>
// ══════════════════════════════════════════════════════════════════════════════
// DIRT v2 — ELITE AUTONOMOUS AI PLATFORM
// Backwards engineered from Polsia with 10 critical upgrades
// Primary: claude-opus-4-7 | Fallback: claude-sonnet-4-6
// ══════════════════════════════════════════════════════════════════════════════

const PRIMARY   = 'claude-opus-4-7';
const FALLBACK  = 'claude-sonnet-4-6';

// ── STATE ────────────────────────────────────────────────────────────────────
let state = {
  view: 'landing',         // landing | onboard | dashboard
  tab:  'command',
  profile: { name:'', mission:'', industry:'', stage:'' },
  messages: [],            // {role,content,scores,stages,agentId}
  logs: [],
  tasks: [],
  agents: [
    { id:'ceo',      name:'APEX',   role:'CEO · Strategic Orchestrator', model:PRIMARY,  status:'active', done:0, icon:'◈', specialty:['strategy','plan','decide','prioritize','analyze','architect'] },
    { id:'research', name:'SCOUT',  role:'Research & Intelligence',      model:FALLBACK, status:'idle',   done:0, icon:'◎', specialty:['research','find','investigate','data','market','competitor','trend'] },
    { id:'marketing',name:'SIGNAL', role:'Marketing & Content',          model:FALLBACK, status:'idle',   done:0, icon:'◐', specialty:['marketing','email','content','social','copy','ad','campaign','brand','outreach'] },
    { id:'dev',      name:'FORGE',  role:'Dev & Product Engineering',    model:FALLBACK, status:'idle',   done:0, icon:'⬡', specialty:['code','build','develop','bug','deploy','api','database','feature','engineering'] },
    { id:'sales',    name:'VECTOR', role:'Sales & Lead Generation',      model:FALLBACK, status:'idle',   done:0, icon:'◆', specialty:['sales','lead','prospect','pitch','close','funnel','pipeline','crm','revenue'] },
    { id:'ops',      name:'RELAY',  role:'Operations & Automation',      model:FALLBACK, status:'idle',   done:0, icon:'◉', specialty:['automate','workflow','process','schedule','ops','integrate','task','system'] },
  ],
  // UPGRADE 3: Persistent pinned memory
  memory: [],              // [{key, value, pinned}]
  // UPGRADE metrics
  totalTasks: 0,
  completedTasks: 0,
  avgQuality: 0,
  qualitySum: 0,
  credits: 45,             // Fix: transparent credit tracking like Polsia promised but didn't deliver
  // Daily cycle
  cycleRunning: false,
  cycleStep: 0,
};

let logId = 100;
function now() { return new Date().toLocaleTimeString('en-US',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'}); }

// ── UPGRADE 2: SMART SEMANTIC ROUTER ─────────────────────────────────────────
function routeTask(input) {
  const lower = input.toLowerCase();
  for (const agent of state.agents) {
    if (agent.id === 'ceo') continue;
    const hit = agent.specialty.find(kw => lower.includes(kw));
    if (hit) return agent;
  }
  return state.agents[0]; // APEX fallback
}

// ── UPGRADE 3: MEMORY MANAGER ─────────────────────────────────────────────
function memoryGet(limit = 5) {
  const pinned = state.memory.filter(m=>m.pinned);
  const recent = state.memory.filter(m=>!m.pinned).slice(-limit);
  return [...pinned, ...recent];
}
function memoryAdd(key, value, pinned=false) {
  state.memory = state.memory.filter(m=>m.key!==key);
  state.memory.push({key,value,pinned,ts:now()});
  if(state.memory.length > 30) state.memory = [...state.memory.filter(m=>m.pinned), ...state.memory.filter(m=>!m.pinned).slice(-20)];
}
function buildMemoryContext() {
  const mems = memoryGet(6);
  if(!mems.length) return '';
  return '\n\nACTIVE MEMORY (pinned facts & recent context):\n' + mems.map(m=>`• [${m.key}]: ${m.value}`).join('\n');
}

// ── LOG ───────────────────────────────────────────────────────────────────────
function addLog(type, text) {
  state.logs.push({id:++logId, type, text, ts:now()});
  if(state.logs.length > 100) state.logs = state.logs.slice(-80);
  renderLogs();
}

// ── UPGRADE 1: PLAN → EXECUTE → REFLECT PIPELINE ────────────────────────────
async function callClaude(system, msgs, model) {
  model = model || PRIMARY;
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model, max_tokens:1000, system,
        messages: msgs.map(m=>({role:m.role, content:m.content}))
      })
    });
    if(!res.ok) {
      if(model===PRIMARY) {
        addLog('warn',`[SYSTEM] Opus 4.7 rate limited → switching to Sonnet 4.6`);
        return callClaude(system, msgs, FALLBACK);
      }
      throw new Error('API '+res.status);
    }
    const d = await res.json();
    return d.content?.find(b=>b.type==='text')?.text || '';
  } catch(e) {
    if(model===PRIMARY) return callClaude(system, msgs, FALLBACK);
    throw e;
  }
}

// UPGRADE 4: LLM-AS-JUDGE QUALITY SCORER
async function scoreOutput(task, output, agent) {
  try {
    const scorePrompt = `You are a quality evaluator for autonomous AI agent outputs. Score this agent response on 4 dimensions, each 0-100.

Task: "${task}"
Agent: ${agent.name} (${agent.role})
Output: "${output.slice(0,800)}"

Respond ONLY with this JSON (no other text):
{"accuracy":85,"completeness":90,"actionability":78,"clarity":88,"summary":"One sentence on biggest strength and gap."}`;

    const raw = await callClaude('You are a strict quality evaluator. Output ONLY valid JSON.', [{role:'user',content:scorePrompt}], FALLBACK);
    const clean = raw.replace(/```json|```/g,'').trim();
    const json = JSON.parse(clean);
    return json;
  } catch(e) {
    return {accuracy:75,completeness:75,actionability:75,clarity:75,summary:'Quality scoring unavailable.'};
  }
}

// UPGRADE 5: EXTRACT AND PIN FACTS FROM OUTPUT
async function extractMemory(task, output) {
  try {
    const prompt = `Extract key factual data from this AI output that should be remembered for future tasks.

Task: "${task}"
Output: "${output.slice(0,600)}"

Respond ONLY with JSON array (max 3 items, empty array if nothing worth pinning):
[{"key":"short fact label","value":"concise fact under 80 chars","pin":true}]`;
    const raw = await callClaude('Extract facts as JSON only. No other text.', [{role:'user',content:prompt}], FALLBACK);
    const clean = raw.replace(/```json|```/g,'').trim();
    const items = JSON.parse(clean);
    if(Array.isArray(items)) items.forEach(item=>memoryAdd(item.key, item.value, item.pin));
  } catch(e) {}
}

// MAIN DISPATCH: Plan → Execute → Reflect
async function dispatch(input) {
  if(!input.trim() || state.credits < 1) return;
  if(state.loading) return;
  state.loading = true;
  state.credits--;

  // Choose agent via smart router
  const agent = routeTask(input);
  const taskId = 'task-'+Date.now();
  const task = {id:taskId, title:input.slice(0,70), agent:agent.name, status:'queued', progress:0, stage:'plan', scores:null, output:''};
  state.tasks.unshift(task);
  state.totalTasks++;

  // Update agent status
  agent.status = 'busy';
  const userMsg = {role:'user', content:input};
  state.messages.push(userMsg);
  render();
  scrollChat();

  const memCtx = buildMemoryContext();
  const companyCtx = `Company: ${state.profile.name||'Not set'} | Industry: ${state.profile.industry||'General'} | Stage: ${state.profile.stage||'Early'} | Mission: ${state.profile.mission||'Not set'}`;

  // ── STAGE 1: PLAN ──
  addLog('plan',`[APEX → ${agent.name}] Stage 1: Planning approach for "${input.slice(0,45)}..."`);
  updateTask(taskId,{status:'running',progress:10,stage:'plan'});

  const planSystem = `You are APEX, the CEO orchestrator of DIRT (Doing Innovative Research on Technology), an elite autonomous AI platform.

${companyCtx}${memCtx}

Your role: Create a precise 3-step execution plan for the task below. Be specific and tactical.
Format your plan EXACTLY as:
STEP 1: [specific action]
STEP 2: [specific action]  
STEP 3: [specific deliverable]

Then on a new line write: ASSIGNED TO: ${agent.name} (${agent.role})`;

  let plan = '';
  try {
    plan = await callClaude(planSystem, [{role:'user',content:input}], PRIMARY);
    addLog('plan',`[APEX] Plan formulated → handing off to ${agent.name}`);
  } catch(e) {
    plan = `STEP 1: Analyze the request\nSTEP 2: Research and draft\nSTEP 3: Deliver output\nASSIGNED TO: ${agent.name}`;
  }
  updateTask(taskId,{progress:30,stage:'execute'});

  // ── STAGE 2: EXECUTE ──
  addLog('info',`[${agent.name}] Stage 2: Executing with ${agent.model}...`);

  const execSystem = `You are ${agent.name}, an elite autonomous AI agent — ${agent.role} — within the DIRT platform.

${companyCtx}${memCtx}

Execution Plan from CEO APEX:
${plan}

Execute this plan for the user's task. Deliver concrete, specific, immediately usable output.
Use Chain-of-Thought: reason through each step explicitly before delivering the final result.
Structure: [Reasoning] → [Execution] → [Deliverable]
Be direct. Give real value. No filler.`;

  let output = '';
  try {
    output = await callClaude(execSystem, [...state.messages.slice(-6)], agent.model);
    addLog('success',`[${agent.name}] Execution complete. Running quality check...`);
  } catch(e) {
    output = `⚠️ Execution error. Check your Anthropic API key. Model: ${agent.model}`;
    updateTask(taskId,{status:'failed',progress:0,stage:'failed'});
    agent.status = 'idle';
    state.messages.push({role:'assistant',content:output,agentId:agent.id,plan:'',scores:null});
    state.loading = false;
    render(); scrollChat();
    return;
  }
  updateTask(taskId,{progress:65,stage:'reflect'});

  // ── STAGE 3: REFLECT + SCORE ──
  addLog('reflect',`[JUDGE] Stage 3: Quality scoring output...`);
  const [scores] = await Promise.all([
    scoreOutput(input, output, agent),
    extractMemory(input, output)
  ]);

  const avgScore = Math.round((scores.accuracy+scores.completeness+scores.actionability+scores.clarity)/4);
  state.qualitySum += avgScore;
  state.completedTasks++;
  state.avgQuality = Math.round(state.qualitySum/state.completedTasks);

  // UPGRADE 6: SELF-REFLECTION — if score < 65, auto-refine
  if(avgScore < 65) {
    addLog('warn',`[JUDGE] Quality score ${avgScore}/100 — triggering refinement pass...`);
    updateTask(taskId,{progress:80,stage:'refine'});
    try {
      const refineSystem = `You are ${agent.name}. Your previous output scored ${avgScore}/100 on quality.
Issues: Accuracy=${scores.accuracy}, Completeness=${scores.completeness}, Actionability=${scores.actionability}
Critic note: "${scores.summary}"

Rewrite your response to a higher standard. Be more specific, complete, and actionable.`;
      output = await callClaude(refineSystem, [...state.messages.slice(-4), {role:'assistant',content:output},{role:'user',content:'Please improve this response.'}], agent.model);
      addLog('reflect',`[JUDGE] Refinement complete. Output upgraded.`);
    } catch(e) { addLog('warn','[JUDGE] Refinement skipped.'); }
  }

  // Finalize
  agent.status = 'idle';
  agent.done++;
  updateTask(taskId,{status:'done',progress:100,stage:'done',scores,output:output.slice(0,250)+'...'});
  addLog('success',`[${agent.name}] Task complete. Quality: ${avgScore}/100 ✓`);
  addLog('success',`[APEX] Directive executed. Credits remaining: ${state.credits}`);

  state.messages.push({role:'assistant',content:output,agentId:agent.id,plan,scores,stage:{plan:'done',execute:'done',reflect:'done'}});
  state.loading = false;

  // Auto-pin company name/mission from first interaction
  if(state.profile.name) memoryAdd('company-name', state.profile.name, true);
  if(state.profile.industry) memoryAdd('industry', state.profile.industry, true);

  render(); scrollChat();
}

function updateTask(id, patch) {
  const i = state.tasks.findIndex(t=>t.id===id);
  if(i>=0) Object.assign(state.tasks[i], patch);
  renderTasks();
}

function scrollChat() {
  setTimeout(()=>{
    const el = document.getElementById('chat-end');
    if(el) el.scrollIntoView({behavior:'smooth'});
  },100);
}

// ── DAILY AUTONOMOUS CYCLE SIMULATION ────────────────────────────────────────
const CYCLE_TASKS = [
  {agent:'APEX',  action:'Strategic review: assessing company metrics and priorities'},
  {agent:'SCOUT', action:'Market intelligence: scanning competitor moves and trends'},
  {agent:'FORGE', action:'Engineering cycle: reviewing bugs and queuing fixes'},
  {agent:'SIGNAL',action:'Marketing execution: drafting content and scheduling posts'},
  {agent:'VECTOR',action:'Sales pipeline: processing leads and drafting outreach'},
  {agent:'RELAY', action:'Ops automation: running workflow checks and optimizations'},
];

async function runDailyCycle() {
  if(state.cycleRunning) return;
  state.cycleRunning = true;
  state.cycleStep = 0;
  addLog('info','[SYSTEM] ⬡ Daily autonomous cycle initiated...');
  renderCycleStatus();

  for(let i=0;i<CYCLE_TASKS.length;i++) {
    state.cycleStep = i+1;
    const ct = CYCLE_TASKS[i];
    const ag = state.agents.find(a=>a.name===ct.agent);
    if(ag) ag.status = 'busy';
    addLog('info',`[${ct.agent}] ${ct.action}`);
    renderAgentSidebar();
    renderCycleStatus();
    await new Promise(r=>setTimeout(r,1800));
    if(ag) { ag.status='idle'; ag.done++; }
  }

  state.cycleRunning = false;
  state.cycleStep = 0;
  state.totalTasks += 6;
  state.completedTasks += 6;
  addLog('success','[APEX] Daily autonomous cycle complete. All agents reporting success.');
  renderAgentSidebar();
  renderCycleStatus();
  renderMetrics();
}

    return `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="14" fill="#11101F" stroke="${col}" stroke-width="1.5"/>

  const agent = state.agents.find(a=>a.id===m.agentId);
  const scores = m.scores;
  const avg = scores ? Math.round((scores.accuracy+scores.completeness+scores.actionability+scores.clarity)/4) : null;
  const scoreClass = avg>=80?'high':avg>=60?'mid':'low';
  return `
<div class="msg assistant slide-up">
  <div class="msg-label">◈ ${agent?agent.name+' · '+agent.role:'DIRT AGENT'}</div>
  ${m.plan?`<div style="margin-bottom:10px;padding:8px 12px;background:rgba(155,89,255,.06);border:1px solid rgba(155,89,255,.2);border-left:3px solid var(--purple)">
    <div class="fm" style="font-size:8px;color:var(--purple);margin-bottom:4px;letter-spacing:1px">APEX PLAN</div>
    <div class="fm" style="font-size:10px;color:var(--t2);line-height:1.8;white-space:pre-wrap">${escHtml(m.plan.slice(0,300))}</div>
  </div>`:''}
  <div class="pre" style="font-size:13px;line-height:1.75">${escHtml(m.content)}</div>
  ${scores?`
  <div class="sbar-wrap">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:8px">
      <div class="score-ring ${scoreClass}">
        <div class="fd" style="font-size:14px;font-weight:700">${avg}</div>
        <div class="fm" style="font-size:6px;opacity:.7">/100</div>
      </div>
      <div style="flex:1">
        <div class="fd" style="font-size:9px;color:var(--t2);margin-bottom:4px">QUALITY SCORE</div>
        <div class="fm" style="font-size:10px;color:var(--t3);line-height:1.7">${escHtml(scores.summary||'')}</div>
      </div>
    </div>
    ${[['Accuracy',scores.accuracy],['Completeness',scores.completeness],['Actionability',scores.actionability],['Clarity',scores.clarity]].map(([l,v])=>`
    <div class="sbar-row">
      <div class="sbar-lbl">${l}</div>
      <div class="sbar-track"><div class="sbar-fill" style="width:${v}%;background:${v>=80?'var(--green)':v>=60?'var(--amber)':'var(--red)'}"></div></div>
      <div class="sbar-val" style="color:${v>=80?'var(--green)':v>=60?'var(--amber)':'var(--red)'}">${v}</div>
    </div>`).join('')}
  </div>`:''}
  <div style="margin-top:8px">
    <span class="msg-stage plan-s">PLAN ✓</span>
    <span class="msg-stage exec-s">EXECUTE ✓</span>
    <span class="msg-stage reflect-s">REFLECT ✓</span>
  </div>
</div>`;
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function escHtml(s='') {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function go(view) { state.view=view; render(); }
function switchTab(tab) { state.tab=tab; render(); }
function handleKey(e) {
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();submitInput();}
}
function submitInput() {
  const el = document.getElementById('chat-input');
  if(!el) return;
  const val = el.value.trim();
  if(!val) return;
  el.value='';
  dispatch(val);
}
function setInput(val) {
  const el = document.getElementById('chat-input');
  if(el) { el.value=val; el.focus(); }
}
function launchDIRT() {
  ['name','mission','industry','stage'].forEach(k=>{
    const el = document.getElementById('ob-'+k);
    if(el) state.profile[k]=el.value.trim();
  });
  if(state.profile.name) memoryAdd('company-name', state.profile.name, true);
  if(state.profile.industry) memoryAdd('industry', state.profile.industry, true);
  if(state.profile.mission) memoryAdd('mission', state.profile.mission, true);
  state.view='dashboard'; state.tab='command'; render();
  addLog('success',`[APEX] Company profile loaded: ${state.profile.name||'Demo Corp'}`);
  addLog('info',`[APEX] Industry: ${state.profile.industry} | Stage: ${state.profile.stage}`);
  addLog('success','[SYSTEM] DIRT autonomous loop activated. Ready for directives.');
}
function addMemManual() {
  const k = document.getElementById('mem-key')?.value.trim();
  const v = document.getElementById('mem-val')?.value.trim();
  if(k&&v) { memoryAdd(k,v,true); render(); }
}
function removeMem(i) {
  state.memory.splice(i,1); render();
}
function clearLogs() { state.logs=[]; render(); }

// ── INIT ──────────────────────────────────────────────────────────────────────
render();
</script>
